name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: synfection
            name: synfection-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: synfection
            name: synfection-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: synfection
            name: synfection-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: synfection.exe
            name: synfection-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libxkbcommon-dev libgtk-3-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.bin }} ${{ matrix.name }}
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}
          generate_release_notes: true
